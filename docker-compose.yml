services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civicops
      POSTGRES_USER: civicops
      POSTGRES_PASSWORD: civicops
    volumes:
      - civicops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicops -d civicops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: CivicOps Agent
      APP_VERSION: 1.0.0
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://civicops:civicops@db:5432/civicops
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  civicops_postgres_data:
