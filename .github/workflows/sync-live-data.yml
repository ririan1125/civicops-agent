name: Sync Live Data

on:
  schedule:
    - cron: "20 7 * * *"
    - cron: "45 7 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://civicops-agent-api-ririan1125.onrender.com' }}
    steps:
      - name: Checkout repository
        if: github.event.schedule == '45 7 * * 1' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Python for RAG precompute
        if: github.event.schedule == '45 7 * * 1' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: github.event.schedule == '45 7 * * 1' || github.event_name == 'workflow_dispatch'
        run: python -m pip install -r backend/requirements.txt

      - name: Sync latest NYC 311 records
        run: |
          curl --fail --show-error --retry 3 --retry-delay 15 --max-time 300 \
            -X POST "${API_BASE_URL}/ingestion/sync-latest" \
            -H "Content-Type: application/json" \
            -d '{"limit":5000,"lookback_days":7}'

      - name: Refresh official RAG sources weekly
        if: github.event.schedule == '45 7 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          python backend/scripts/build_and_upload_rag_index.py \
            --api-base "${API_BASE_URL}" \
            --max-311-articles 120 \
            --timeout-seconds 900
          curl --fail --show-error --retry 3 --retry-delay 15 --max-time 180 \
            -X POST "${API_BASE_URL}/rag/vector-store/init"
