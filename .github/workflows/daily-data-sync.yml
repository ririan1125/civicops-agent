name: Daily CivicOps data sync

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python for weekly RAG precompute
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Wake backend
        run: |
          curl --retry 5 --retry-delay 10 --max-time 60 \
            https://civicops-agent-api-ririan1125.onrender.com/health

      - name: Sync latest NYC 311 service requests
        run: |
          curl --fail-with-body --retry 2 --retry-delay 10 --max-time 600 \
            -X POST https://civicops-agent-api-ririan1125.onrender.com/ingestion/sync-latest \
            -H "Content-Type: application/json" \
            --data '{"limit":5000,"lookback_days":7}'

      - name: Weekly refresh RAG sources and pgvector mirror
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            python backend/scripts/build_and_upload_rag_index.py \
              --api-base https://civicops-agent-api-ririan1125.onrender.com \
              --max-311-articles 120 \
              --timeout-seconds 900
            curl --fail-with-body --retry 2 --retry-delay 10 --max-time 180 \
              -X POST https://civicops-agent-api-ririan1125.onrender.com/rag/vector-store/init
          else
            echo "RAG source refresh runs on Mondays UTC; SQL data sync runs daily."
          fi
